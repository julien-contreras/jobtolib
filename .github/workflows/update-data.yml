name: Update Enterprise Data Weekly

on:
  # Exécution programmée : chaque dimanche à 2h du matin (UTC)
  schedule:
    - cron: '0 2 * * 0'
  
  # Aussi manuelle via GitHub UI
  workflow_dispatch:

jobs:
  download-and-update:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write
    
    steps:
      - name: "✅ Checkout repository"
        uses: actions/checkout@v4
      
      - name: "🐍 Setup Python"
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: "📦 Install dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: "🚀 Download and process data"
        run: |
          python download_entreprises.py
      
      - name: "📊 Check generated files"
        run: |
          echo "=== Generated files ==="
          ls -lh data/
          echo ""
          echo "=== Index content ==="
          head -20 data/index.json
      
      - name: "🔄 Commit and push changes"
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/
          git commit -m "📊 Update: Enterprise data updated at $(date)" || echo "No changes to commit"
          git push
      
      - name: "✅ Success notification"
        run: echo "🎉 Data update completed successfully at $(date)"
